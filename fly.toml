app = 'nudge-panel-experts-prod'
primary_region = 'lhr'

[env]
  HOSTNAME = '0.0.0.0'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
